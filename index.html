<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidayat - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .logo-placeholder {
            width: 150px;
            height: 150px;
            margin: 0 auto 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: white;
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .tagline {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 300;
        }

        .features {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .feature-badge {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
        }

        .cta-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .email-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .email-input input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .email-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .email-input button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .email-input button:hover {
            transform: translateY(-2px);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .logo-placeholder {
                width: 120px;
                height: 120px;
                font-size: 50px;
            }

            .email-input {
                flex-direction: column;
            }

            .email-input button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Placeholder -->
        <div class="logo-placeholder">
            <!-- Replace this with your actual logo -->
            <img src="./logo.jpeg" alt="Hidayat Logo" style="max-width: 100%; max-height: 100%; border-radius: 10px;">
        </div>

        <!-- Main Content -->
        <h1>Hidayat</h1>
        <p class="tagline">
            Something amazing is coming your way. We're working hard to bring you an exceptional experience.
        </p>

        <!-- Features/Benefits -->
        <div class="features">
            <div class="feature-badge">✨ Innovation</div>
            <div class="feature-badge">🚀 Excellence</div>
            <div class="feature-badge">💡 Quality</div>
        </div>

        <!-- Call to Action -->
        <div class="cta-section">
            <p style="color: #666; margin-bottom: 15px; font-size: 14px;">Be the first to know when we launch</p>
            <div class="email-input">
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit">Notify</button>
            </div>

            <div class="social-links">
                <a href="#">Twitter</a>
                <a href="#">LinkedIn</a>
                <a href="#">Facebook</a>
            </div>
        </div>
    </div>
</body>
</html>
